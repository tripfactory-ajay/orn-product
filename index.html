<!DOCTYPE html>
<html>
<head>
  <title>ORN Product – Login</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      height:100vh;
      background: url('https://images.unsplash.com/photo-1501117716987-c8e1ecb210e2') no-repeat center center/cover;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .overlay {
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
    }

    .login-box {
      position:relative;
      background:rgba(2,6,23,0.9);
      padding:40px;
      border-radius:12px;
      width:320px;
      text-align:center;
      color:white;
      backdrop-filter: blur(10px);
    }

    .login-box img {
      width:70px;
      margin-bottom:10px;
    }

    input {
      width:100%;
      padding:12px;
      margin-top:12px;
      border:none;
      border-radius:6px;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:15px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    .error {
      color:red;
      margin-top:10px;
      font-size:12px;
    }

  </style>
</head>

<body>

<div class="overlay"></div>

<div class="login-box">
  <img src="branding/logo.jpg">
  <h2>ORN Product</h2>
  <p>Powered by ARA Agents™</p>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="error" id="error"></div>
</div>

<script>
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u==="ORN" && p==="ARA"){
    window.location.href="dashboard/";
  } else {
    document.getElementById("error").innerText="Invalid login";
  }
}
</script>

</body>
</html>
