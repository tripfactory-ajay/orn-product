<!DOCTYPE html>
<html>
<head>
  <title>ORN Product – Login</title>

  <style>
    body {
      margin:0;
      font-family: Arial;
      height:100vh;
      background: url('https://images.unsplash.com/photo-1501117716987-c8e1ecb210e2') no-repeat center center/cover;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .overlay {
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.75);
    }

    .login-box {
      position:relative;
      background:#020617;
      padding:40px;
      border-radius:12px;
      width:300px;
      text-align:center;
      color:white;
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    .login-box img {
      width:60px;
      margin-bottom:10px;
    }

    h2 {
      margin-bottom:5px;
    }

    p {
      font-size:12px;
      color:#94a3b8;
    }

    input {
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:6px;
    }

    button {
      width:100%;
      padding:10px;
      margin-top:15px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    button:hover {
      background:#2563eb;
    }

    .error {
      color:red;
      margin-top:10px;
      font-size:12px;
    }

  </style>
</head>

<body>

<div class="overlay"></div>

<div class="login-box">
  <img src="branding/logo.jpg">
  <h2>ORN Product</h2>
  <p>Powered by ARA Agents™</p>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="error" id="error"></div>
</div>

<script>

function login(){

  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === "ORN" && p === "ARA"){
    window.location.href = "dashboard/";
  } else {
    document.getElementById("error").innerText = "Invalid login";
  }
}

</script>

</body>
</html>
