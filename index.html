<!DOCTYPE html>
<html>
<head>
  <title>ORN Product – Login</title>

  <style>
    body {
      margin:0;
      font-family: 'Inter', Arial;
      height:100vh;

      /* ✅ FIXED PATH */
      background: url('/orn-product/branding/login-bg.jpg') no-repeat center center/cover;

      display:flex;
      align-items:center;
      justify-content:center;
    }

    .overlay {
      position:absolute;
      width:100%;
      height:100%;
      background:linear-gradient(
        rgba(2,6,23,0.85),
        rgba(2,6,23,0.95)
      );
    }

    .login-box {
      position:relative;
      background:rgba(2,6,23,0.85);
      padding:40px;
      border-radius:16px;
      width:340px;
      text-align:center;
      color:white;

      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:0 20px 40px rgba(0,0,0,0.5);
    }

    .logo {
      width:140px;
      margin-bottom:10px;
    }

    h2 {
      margin-bottom:5px;
      font-weight:600;
    }

    p {
      color:#94a3b8;
      font-size:13px;
    }

    input {
      width:100%;
      padding:12px;
      margin-top:12px;
      border:none;
      border-radius:8px;
      background:#020617;
      color:white;
    }

    input::placeholder {
      color:#64748b;
    }

    button {
      width:100%;
      padding:12px;
      margin-top:15px;
      background:linear-gradient(90deg,#3b82f6,#2563eb);
      border:none;
      color:white;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
      transition:0.3s;
    }

    button:hover {
      transform:translateY(-1px);
      box-shadow:0 10px 20px rgba(59,130,246,0.3);
    }

    .error {
      color:#ef4444;
      margin-top:10px;
      font-size:12px;
    }

  </style>
</head>

<body>

<div class="overlay"></div>

<div class="login-box">

  <!-- ✅ FIXED LOGO PATH -->
  <img src="/orn-product/branding/logo.png" class="logo">

  <h2>ORN Product</h2>
  <p>Powered by ARA Agents™</p>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="error" id="error"></div>
</div>

<script>

function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(u === "ORN" && p === "ARA"){
    window.location.href = "dashboard/";
  } else {
    document.getElementById("error").innerText = "Invalid login";
  }
}

</script>

</body>
</html>
