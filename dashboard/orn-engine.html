<!DOCTYPE html>
<html>
<head>
  <title>ORN Product – ARA Agents</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    .layout { display:flex; }

    .sidebar {
      width:220px;
      background:#020617;
      height:100vh;
      padding:20px;
      border-right:1px solid #1e293b;
    }

    .sidebar img { width:50px; }

    .menu div {
      padding:10px;
      margin-top:10px;
      color:#94a3b8;
      cursor:pointer;
    }

    .menu div:hover {
      background:#1e293b;
      color:white;
    }

    .main {
      flex:1;
      padding:25px;
    }

    .cards {
      display:flex;
      gap:15px;
      margin-top:20px;
    }

    .card {
      flex:1;
      background:#020617;
      padding:20px;
      border-radius:10px;
      border:1px solid #1e293b;
      text-align:center;
    }

    canvas { margin-top:30px; }

    .chat {
      position:fixed;
      right:20px;
      bottom:20px;
      width:300px;
      height:70%;
      background:#020617;
      border:1px solid #1e293b;
      padding:15px;
      display:flex;
      flex-direction:column;
    }

    .chat-box {
      flex:1;
      overflow:auto;
    }

    .msg { margin:5px 0; padding:8px; border-radius:6px; }
    .ai { background:#1e293b; }
    .user { background:#3b82f6; text-align:right; }

  </style>
</head>

<body>

<div class="layout">

  <div class="sidebar">
    <img src="/orn-product/branding/logo.jpg">
    <h3>ORN Product</h3>
    <small>ARA Agents™</small>

    <div class="menu">
      <div onclick="runThailand()">Dashboard</div>
    </div>
  </div>

  <div class="main">

    <h1>AI Revenue Intelligence</h1>

    <div class="cards">
      <div class="card"><b>Revenue</b><br><span id="rev">-</span></div>
      <div class="card"><b>Profit</b><br><span id="profit">-</span></div>
      <div class="card"><b>Margin</b><br><span id="margin">-</span></div>
    </div>

    <canvas id="chart"></canvas>

  </div>

</div>

<div class="chat">
  <div class="chat-box" id="chatBox">
    <div class="msg ai">ARA Agent ready. Type: Launch Thailand</div>
  </div>

  <input id="chatInput" placeholder="Ask..." onkeydown="chatEnter(event)">
</div>

<script>

function addMsg(text,type){
  const box=document.getElementById("chatBox");
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  box.appendChild(div);
}

function chatEnter(e){
  if(e.key==="Enter"){
    const val=document.getElementById("chatInput").value;
    addMsg(val,"user");

    if(val.toLowerCase().includes("thailand")){
      runThailand();
    }

    document.getElementById("chatInput").value="";
  }
}

async function runThailand(){

  addMsg("ARA analysing Thailand data...","ai");

  const res = await fetch("/orn-product/data/thailand-bookings.csv");
  const text = await res.text();

  const rows = text.split("\n").slice(1);

  let revenue=0, cost=0;

  rows.forEach(r=>{
    const c=r.split(",");
    if(c.length<8) return;

    revenue += c[7]*c[4]*c[5];
    cost += c[6]*c[4]*c[5];
  });

  const profit = revenue-cost;
  const margin = ((profit/revenue)*100).toFixed(1);

  document.getElementById("rev").innerText="£"+Math.round(revenue);
  document.getElementById("profit").innerText="£"+Math.round(profit);
  document.getElementById("margin").innerText=margin+"%";

  drawChart(rows);

  addMsg("ARA complete. Phuket shows margin pressure.","ai");
}

function drawChart(rows){

  let labels=[], data=[];

  rows.forEach(r=>{
    const c=r.split(",");
    if(c.length<8) return;
    labels.push(c[1]);
    data.push(c[7]-c[6]);
  });

  const ctx=document.getElementById("chart");

  if(window.chart) window.chart.destroy();

  window.chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:labels,
      datasets:[{label:"Margin",data:data}]
    }
  });
}

</script>

</body>
</html>
