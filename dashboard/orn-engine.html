<!DOCTYPE html>
<html>
<head>
  <title>ORN Product – AI Revenue Engine</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #f5f7fa, #e4ecf7);
      padding: 30px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    input {
      padding: 12px;
      width: 350px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .output {
      margin-top: 25px;
      background: white;
      padding: 25px;
      border-radius: 10px;
      border-left: 6px solid #2c3e50;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    .card-container {
      display: flex;
      gap: 20px;
      margin-top: 15px;
    }

    .card {
      background: #ffffff;
      padding: 20px;
      border-radius: 10px;
      flex: 1;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .green { color: green; }
    .red { color: red; }
    .yellow { color: #c9a000; }

    #chat {
      margin-top: 15px;
      font-style: italic;
      color: #555;
    }

    canvas {
      margin-top: 30px;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="../branding/logo.jpg" width="60">
  <h1>ORN Product – AI Revenue Engine</h1>
</div>

<br>

<input id="command" placeholder="Ask ORN e.g. Launch Thailand">
<button onclick="runCommand()">Run</button>

<div id="chat"></div>

<div class="output" id="output"></div>

<canvas id="chart"></canvas>

<script>

function think(message) {
  document.getElementById("chat").innerHTML = message;
}

async function runCommand() {
  think("Analysing real data…");

  setTimeout(() => {
    runThailand();
  }, 1500);
}

async function runThailand() {

  const response = await fetch("../data/thailand-hotels.csv");
  const text = await response.text();
  const rows = text.split("\n").slice(1);

  let totalRevenue = 0;
  let totalMargin = 0;
  let savings = 0;
  let lowMargin = 0;

  let hotelNames = [];
  let margins = [];

  rows.forEach(row => {
    const [hotel, city, cost, sell, market] = row.split(",");

    const margin = sell - cost;
    totalMargin += margin;
    totalRevenue += sell;

    if (margin < 15) lowMargin++;

    if (market < cost) {
      savings += (cost - market);
    }

    hotelNames.push(hotel);
    margins.push(margin);
  });

  document.getElementById("output").innerHTML = `
    <h2>🌏 Thailand Market Analysis (LIVE)</h2>

    <div class="card-container">
      <div class="card"><b>Revenue</b><br>£${totalRevenue}</div>
      <div class="card green"><b>Savings</b><br>£${savings}</div>
      <div class="card red"><b>Low Margin</b><br>${lowMargin}</div>
    </div>

    <h3>📊 Insight</h3>
    <p>Data shows strong pricing opportunity and supplier optimisation potential.</p>
  `;

  drawChart(hotelNames, margins);
}

function drawChart(labels, data) {

  const ctx = document.getElementById('chart').getContext('2d');

  if (window.myChart) {
    window.myChart.destroy();
  }

  window.myChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Margin per Hotel (£)',
        data: data
      }]
    }
  });
}

</script>

</body>
</html>
