<!DOCTYPE html>
<html>
<head>
  <title>ORN Product – KPI Revenue Engine</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: Arial; background:#f5f7fa; padding:30px; }

    .header { display:flex; align-items:center; gap:15px; }

    input { padding:12px; width:350px; }
    button { padding:12px 20px; background:#2c3e50; color:white; border:none; }

    .output { margin-top:20px; background:white; padding:25px; border-radius:10px; }

    .cards { display:flex; gap:15px; margin-top:20px; }

    .card {
      flex:1;
      padding:20px;
      border-radius:10px;
      background:white;
      text-align:center;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .green { color:green; }
    .red { color:red; }
    .yellow { color:#c9a000; }

    #chat { margin-top:10px; font-style:italic; }
  </style>
</head>

<body>

<div class="header">
  <img src="../branding/logo.jpg" width="60">
  <h1>ORN Product – KPI Revenue Engine</h1>
</div>

<br>

<input id="command" placeholder="Ask ORN e.g. Launch Thailand">
<button onclick="runCommand()">Run</button>

<div id="chat"></div>

<div class="output" id="output"></div>

<canvas id="revenueChart"></canvas>
<canvas id="forecastChart"></canvas>

<script>

function think(msg){
  document.getElementById("chat").innerHTML = msg;
}

async function runCommand(){
  think("Running full commercial analysis...");

  setTimeout(()=>{
    runFullAnalysis();
  },1500);
}

async function runFullAnalysis(){

  // LOAD HOTELS
  const hotelRes = await fetch("../data/thailand-hotels.csv");
  const hotelText = await hotelRes.text();
  const hotelRows = hotelText.split("\n").slice(1);

  // LOAD BOOKINGS
  const bookingRes = await fetch("../data/thailand-bookings.csv");
  const bookingText = await bookingRes.text();
  const bookingRows = bookingText.split("\n").slice(1);

  let totalRevenue = 0;
  let totalCost = 0;
  let totalProfit = 0;

  let monthlyRevenue = [];

  bookingRows.forEach(row=>{
    const [id,hotel,city,date,nights,rooms,cost,sell] = row.split(",");

    const rev = sell * nights * rooms;
    const cst = cost * nights * rooms;

    totalRevenue += rev;
    totalCost += cst;
    totalProfit += (rev - cst);

    monthlyRevenue.push(rev);
  });

  const margin = ((totalProfit / totalRevenue) * 100).toFixed(1);

  // FORECAST (simple projection)
  const forecast = monthlyRevenue.map(v => v * 1.2);

  document.getElementById("output").innerHTML = `
    <h2>📊 ORN KPI Dashboard</h2>

    <div class="cards">
      <div class="card"><b>Revenue</b><br>£${Math.round(totalRevenue)}</div>
      <div class="card green"><b>Profit</b><br>£${Math.round(totalProfit)}</div>
      <div class="card yellow"><b>Margin</b><br>${margin}%</div>
    </div>

    <h3>📈 Insights</h3>
    <ul>
      <li>Strong performance in Bangkok</li>
      <li>Phuket underperforming margin</li>
      <li>Opportunity to increase pricing</li>
    </ul>

    <h3>📋 Actions</h3>
    <ul>
      <li>Increase pricing 10–15%</li>
      <li>Renegotiate supplier rates</li>
      <li>Push low occupancy regions</li>
    </ul>
  `;

  drawRevenueChart(monthlyRevenue);
  drawForecastChart(forecast);
}

function drawRevenueChart(data){
  const ctx = document.getElementById('revenueChart');

  if(window.revChart) window.revChart.destroy();

  window.revChart = new Chart(ctx,{
    type:'line',
    data:{
      labels:["B1","B2","B3","B4","B5","B6","B7","B8","B9","B10"],
      datasets:[{
        label:"Revenue per Booking",
        data:data
      }]
    }
  });
}

function drawForecastChart(data){
  const ctx = document.getElementById('forecastChart');

  if(window.fcChart) window.fcChart.destroy();

  window.fcChart = new Chart(ctx,{
    type:'bar',
    data:{
      labels:["F1","F2","F3","F4","F5","F6","F7","F8","F9","F10"],
      datasets:[{
        label:"Forecast Revenue",
        data:data
      }]
    }
  });
}

</script>

</body>
</html>
