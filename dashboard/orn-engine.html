<!DOCTYPE html>
<html>
<head>
  <title>ORN Product – ARA Agents Platform</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', Arial;
      background:#f4f7fb;
    }

    .layout { display:flex; }

    .sidebar {
      width:240px;
      background:#ffffff;
      height:100vh;
      border-right:1px solid #e6e6e6;
      padding:20px;
    }

    .logo {
      display:flex;
      align-items:center;
      gap:10px;
    }

    .logo img { width:50px; }

    .logo h2 { margin:0; font-size:18px; }

    .tag {
      font-size:12px;
      color:#888;
    }

    .menu {
      margin-top:30px;
    }

    .menu div {
      padding:10px;
      border-radius:6px;
      cursor:pointer;
    }

    .menu div:hover {
      background:#f0f4f8;
    }

    .main {
      flex:1;
      padding:30px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    input {
      padding:10px;
      width:280px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    button {
      padding:10px 15px;
      background:#2c3e50;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .cards {
      display:flex;
      gap:15px;
      margin-top:25px;
    }

    .card {
      flex:1;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 3px 8px rgba(0,0,0,0.05);
    }

    canvas { margin-top:30px; }

    .chat-panel {
      position:fixed;
      right:0;
      top:0;
      width:340px;
      height:100%;
      background:white;
      border-left:1px solid #eee;
      padding:20px;
      display:flex;
      flex-direction:column;
    }

    .chat-header {
      font-weight:bold;
      margin-bottom:10px;
    }

    .chat-box {
      flex:1;
      overflow:auto;
    }

    .chat-msg {
      margin:10px 0;
      padding:10px;
      border-radius:8px;
    }

    .ai {
      background:#eef3f8;
    }

    .user {
      background:#d9ecff;
      text-align:right;
    }

  </style>
</head>

<body>

<div class="layout">

  <div class="sidebar">
    <div class="logo">
      <img src="../branding/logo.jpg">
      <div>
        <h2>ORN Product</h2>
        <div class="tag">Powered by ARA Agents™</div>
      </div>
    </div>

    <div class="menu">
      <div onclick="runAnalysis()">Dashboard</div>
      <div>Markets</div>
      <div>Bookings</div>
      <div>Suppliers</div>
      <div>ARA Agents</div>
    </div>
  </div>

  <div class="main">

    <div class="topbar">
      <h1>Revenue Intelligence Platform</h1>
      <div>
        <input id="command" placeholder="Launch Thailand / Ask ARA Agents">
        <button onclick="runAnalysis()">Run</button>
      </div>
    </div>

    <div class="cards">
      <div class="card"><b>Total Revenue</b><br><span id="rev">-</span></div>
      <div class="card"><b>Total Profit</b><br><span id="profit">-</span></div>
      <div class="card"><b>Margin %</b><br><span id="margin">-</span></div>
    </div>

    <canvas id="chart"></canvas>

  </div>

</div>

<div class="chat-panel">

  <div class="chat-header">🤖 ARA Agents</div>

  <div class="chat-box" id="chatBox">
    <div class="chat-msg ai">
      ARA Commercial Agent: Reviewing performance. Would you like margin insights or pricing opportunities?
    </div>
  </div>

  <input id="chatInput" placeholder="Ask ARA Agents..." onkeydown="chatEnter(event)">

</div>

<script>

function addChat(msg,type="ai"){
  const box = document.getElementById("chatBox");
  const div = document.createElement("div");
  div.className = "chat-msg "+type;
  div.innerText = msg;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function chatEnter(e){
  if(e.key==="Enter"){
    const val = document.getElementById("chatInput").value;
    addChat(val,"user");

    setTimeout(()=>{ respondARA(val); },1000);
  }
}

function respondARA(input){
  let response = "ARA Agent: Let me review that further.";

  if(input.includes("margin")){
    response = "ARA Commercial Agent: Margin below target in Phuket. Suggest renegotiation.";
  }

  if(input.includes("opportunity")){
    response = "ARA Revenue Agent: Bangkok pricing uplift opportunity of +18%.";
  }

  if(input.includes("supplier")){
    response = "ARA Contracting Agent: Phuket suppliers overpriced vs market.";
  }

  addChat(response,"ai");
}

async function runAnalysis(){

  addChat("ARA System: Running full commercial analysis...");

  const res = await fetch("../data/thailand-bookings.csv");
  const text = await res.text();
  const rows = text.split("\n").slice(1);

  let revenue=0, cost=0;

  rows.forEach(r=>{
    const [id,h,c,d,n,rooms,costP,sellP] = r.split(",");
    revenue += sellP*n*rooms;
    cost += costP*n*rooms;
  });

  const profit = revenue - cost;
  const margin = ((profit/revenue)*100).toFixed(1);

  document.getElementById("rev").innerText = "£"+Math.round(revenue);
  document.getElementById("profit").innerText = "£"+Math.round(profit);
  document.getElementById("margin").innerText = margin+"%";

  drawChart(rows);
}

function drawChart(rows){

  let labels=[], data=[];

  rows.forEach(r=>{
    const [id,h,c,d,n,rooms,costP,sellP] = r.split(",");
    labels.push(h);
    data.push((sellP-costP));
  });

  const ctx = document.getElementById("chart");

  if(window.chart) window.chart.destroy();

  window.chart = new Chart(ctx,{
    type:'bar',
    data:{
      labels:labels,
      datasets:[{
        label:"Margin per Booking (£)",
        data:data
      }]
    }
  });
}

</script>

</body>
</html>
