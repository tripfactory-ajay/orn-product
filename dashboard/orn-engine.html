<!DOCTYPE html>
<html>
<head>
  <title>ORN Product – ARA Agents</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    .layout { display:flex; }

    .sidebar {
      width:220px;
      background:#020617;
      height:100vh;
      padding:20px;
      border-right:1px solid #1e293b;
    }

    .sidebar img { width:50px; }

    .menu div {
      padding:10px;
      margin-top:10px;
      color:#94a3b8;
      cursor:pointer;
      border-radius:6px;
    }

    .menu div:hover {
      background:#1e293b;
      color:white;
    }

    .main {
      flex:1;
      padding:25px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    input {
      padding:10px;
      width:260px;
      border-radius:6px;
      border:none;
      outline:none;
    }

    button {
      padding:10px 15px;
      background:#3b82f6;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .cards {
      display:flex;
      gap:15px;
      margin-top:20px;
    }

    .card {
      flex:1;
      background:#020617;
      padding:20px;
      border-radius:10px;
      border:1px solid #1e293b;
      text-align:center;
    }

    canvas { margin-top:30px; }

    /* CHAT */
    .chat-panel {
      position:fixed;
      right:20px;
      bottom:20px;
      width:320px;
      height:75%;
      background:#020617;
      border:1px solid #1e293b;
      border-radius:12px;
      display:flex;
      flex-direction:column;
      padding:15px;
    }

    .chat-box {
      flex:1;
      overflow:auto;
    }

    .chat-msg {
      margin:8px 0;
      padding:10px;
      border-radius:8px;
      font-size:14px;
    }

    .ai { background:#1e293b; }
    .user { background:#3b82f6; text-align:right; }

    #chatInput {
      margin-top:10px;
      padding:10px;
      border:none;
      border-radius:6px;
      outline:none;
    }

  </style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <img src="/orn-product/branding/logo.jpg">
    <h3>ORN Product</h3>
    <small>ARA Agents™</small>

    <div class="menu">
      <div onclick="runAnalysis()">Dashboard</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h1>AI Revenue Intelligence</h1>
      <div>
        <input id="command" placeholder="Launch Thailand">
        <button onclick="runAnalysis()">Run</button>
      </div>
    </div>

    <!-- KPI -->
    <div class="cards">
      <div class="card"><b>Revenue</b><br><span id="rev">-</span></div>
      <div class="card"><b>Profit</b><br><span id="profit">-</span></div>
      <div class="card"><b>Margin</b><br><span id="margin">-</span></div>
    </div>

    <canvas id="chart"></canvas>

  </div>

</div>

<!-- CHAT -->
<div class="chat-panel">

  <div class="chat-box" id="chatBox">
    <div class="chat-msg ai">
      ARA Agent: Ready. Type "Launch Thailand"
    </div>
  </div>

  <input id="chatInput" placeholder="Ask..." onkeydown="chatEnter(event)">

</div>

<script>

// CHAT
function addMsg(text,type){
  const box=document.getElementById("chatBox");
  const div=document.createElement("div");
  div.className="chat-msg "+type;
  div.innerText=text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function chatEnter(e){
  if(e.key==="Enter"){
    const val=document.getElementById("chatInput").value;
    addMsg(val,"user");

    handleCommand(val);

    document.getElementById("chatInput").value="";
  }
}

// BUTTON
function runAnalysis(){
  const cmd = document.getElementById("command").value || "Launch Thailand";
  handleCommand(cmd);
}

// COMMAND ROUTER
function handleCommand(cmd){

  if(!cmd) return;

  addMsg("ARA System: Processing...","ai");

  const lower = cmd.toLowerCase();

  if(lower.includes("thailand")){
    runThailand();
  }
  else if(lower.includes("margin")){
    addMsg("ARA Agent: Margin low in Phuket.","ai");
  }
  else if(lower.includes("opportunity")){
    addMsg("ARA Agent: Bangkok pricing +18%.","ai");
  }
  else{
    addMsg("ARA Agent: Try 'Launch Thailand'","ai");
  }
}

// MAIN ANALYSIS
async function runThailand(){

  try {

    addMsg("ARA Analyst: Loading data...","ai");

    const res = await fetch("/orn-product/data/thailand-bookings.csv");

    if(!res.ok) throw new Error("CSV missing");

    const text = await res.text();

    const rows = text.split("\n").filter(r => r.trim() !== "").slice(1);

    let revenue=0;
    let cost=0;

    rows.forEach(r=>{
      const c=r.split(",");
      if(c.length<8) return;

      const nights = Number(c[4]);
      const rooms = Number(c[5]);
      const costP = Number(c[6]);
      const sellP = Number(c[7]);

      if(isNaN(nights) || isNaN(rooms)) return;

      revenue += sellP * nights * rooms;
      cost += costP * nights * rooms;
    });

    const profit = revenue - cost;
    const margin = revenue ? ((profit/revenue)*100).toFixed(1) : 0;

    document.getElementById("rev").innerText="£"+Math.round(revenue);
    document.getElementById("profit").innerText="£"+Math.round(profit);
    document.getElementById("margin").innerText=margin+"%";

    drawChart(rows);

    addMsg("ARA Analyst: Analysis complete.","ai");

  } catch(err){
    addMsg("ERROR: Cannot load data.","ai");
    console.error(err);
  }
}

// CHART
function drawChart(rows){

  let labels=[], data=[];

  rows.forEach(r=>{
    const c=r.split(",");
    if(c.length<8) return;

    labels.push(c[1]);
    data.push(Number(c[7]) - Number(c[6]));
  });

  const ctx=document.getElementById("chart");

  if(window.chart) window.chart.destroy();

  window.chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:labels,
      datasets:[{
        label:"Margin",
        data:data
      }]
    }
  });
}

</script>

</body>
</html>
