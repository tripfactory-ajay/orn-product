<!DOCTYPE html>
<html>
<head>
  <title>ORN Product – ARA Agents</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    .layout { display:flex; }

    .sidebar {
      width:220px;
      background:#020617;
      height:100vh;
      padding:20px;
    }

    .sidebar img { width:50px; }

    .main {
      flex:1;
      padding:25px;
    }

    .cards {
      display:flex;
      gap:15px;
      margin-top:20px;
    }

    .card {
      flex:1;
      background:#020617;
      padding:20px;
      border-radius:10px;
      text-align:center;
    }

    canvas { margin-top:30px; }

    .chat {
      position:fixed;
      right:20px;
      bottom:20px;
      width:320px;
      height:70%;
      background:#020617;
      border-radius:12px;
      padding:15px;
      display:flex;
      flex-direction:column;
    }

    .chat-box { flex:1; overflow:auto; }

    .msg { margin:5px; padding:8px; border-radius:6px; }
    .ai { background:#1e293b; }
    .user { background:#3b82f6; text-align:right; }

  </style>
</head>

<body>

<div class="layout">

  <div class="sidebar">
    <img src="/orn-product/branding/logo.jpg">
    <h3>ORN Product</h3>
    <small>ARA Agents™</small>
  </div>

  <div class="main">

    <h1>AI Revenue Intelligence</h1>

    <div class="cards">
      <div class="card">Revenue<br><span id="rev">-</span></div>
      <div class="card">Profit<br><span id="profit">-</span></div>
      <div class="card">Margin<br><span id="margin">-</span></div>
    </div>

    <canvas id="chart"></canvas>

  </div>

</div>

<div class="chat">
  <div class="chat-box" id="chatBox">
    <div class="msg ai">ARA Coordinator: Ready. Type “Launch Thailand”.</div>
  </div>

  <input id="chatInput" onkeydown="chatEnter(event)" placeholder="Ask...">
</div>

<script>

function addMsg(text,type){
  const box=document.getElementById("chatBox");
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  box.appendChild(div);
}

function chatEnter(e){
  if(e.key==="Enter"){
    const val=document.getElementById("chatInput").value;
    addMsg(val,"user");
    handleCommand(val);
    document.getElementById("chatInput").value="";
  }
}

function handleCommand(cmd){

  addMsg("ARA Coordinator: Reviewing with team...","ai");

  if(cmd.toLowerCase().includes("thailand")){
    runTeam();
  }
}

async function runTeam(){

  addMsg("ARA Product Agent: Demand strong in Bangkok.","ai");

  setTimeout(()=>{
    addMsg("ARA Commercial Agent: Margin underperforming in Phuket.","ai");
  },1000);

  setTimeout(()=>{
    addMsg("ARA Contracting Agent: Supplier costs above market.","ai");
  },2000);

  setTimeout(()=>{
    runData();
  },3000);

}

async function runData(){

  const res = await fetch("/orn-product/data/thailand-bookings.csv");
  const text = await res.text();

  const rows = text.split("\n").slice(1);

  let revenue=0, cost=0;

  rows.forEach(r=>{
    const c=r.split(",");
    if(c.length<8) return;

    revenue += c[7]*c[4]*c[5];
    cost += c[6]*c[4]*c[5];
  });

  const profit=revenue-cost;
  const margin=((profit/revenue)*100).toFixed(1);

  document.getElementById("rev").innerText="£"+Math.round(revenue);
  document.getElementById("profit").innerText="£"+Math.round(profit);
  document.getElementById("margin").innerText=margin+"%";

  drawChart(rows);

  addMsg("ARA Coordinator: Increase pricing + renegotiate suppliers.","ai");
}

function drawChart(rows){

  let labels=[], data=[];

  rows.forEach(r=>{
    const c=r.split(",");
    if(c.length<8) return;
    labels.push(c[1]);
    data.push(c[7]-c[6]);
  });

  new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{ labels:labels, datasets:[{label:"Margin",data:data}] }
  });
}

</script>

</body>
</html>
