<!DOCTYPE html>
<html>
<head>
  <title>ORN Product – ARA Agents</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family: 'Inter', Arial;
      background:#020617;
      color:white;
    }

    .layout { display:flex; }

    .sidebar {
      width:240px;
      background:#020617;
      padding:20px;
      border-right:1px solid #1e293b;
    }

    .sidebar img { width:55px; }

    .menu div {
      padding:12px;
      margin-top:10px;
      border-radius:8px;
      color:#94a3b8;
      cursor:pointer;
    }

    .menu div:hover {
      background:#1e293b;
      color:white;
    }

    .main {
      flex:1;
      padding:30px;
    }

    h1 {
      margin-bottom:10px;
    }

    .cards {
      display:flex;
      gap:20px;
      margin-top:20px;
    }

    .card {
      flex:1;
      background:#0f172a;
      padding:20px;
      border-radius:12px;
    }

    .card span {
      font-size:24px;
      display:block;
      margin-top:5px;
    }

    .report {
      margin-top:30px;
      background:#0f172a;
      padding:20px;
      border-radius:12px;
      line-height:1.6;
    }

    canvas { margin-top:30px; }

    /* CHAT */
    .chat {
      position:fixed;
      right:20px;
      bottom:20px;
      width:360px;
      height:75%;
      background:#020617;
      border:1px solid #1e293b;
      border-radius:12px;
      display:flex;
      flex-direction:column;
    }

    .chat-header {
      padding:12px;
      border-bottom:1px solid #1e293b;
      font-weight:bold;
    }

    .chat-box {
      flex:1;
      overflow:auto;
      padding:10px;
    }

    .msg {
      margin:8px;
      padding:10px;
      border-radius:8px;
    }

    .ai { background:#1e293b; }
    .user { background:#3b82f6; text-align:right; }

    #chatInput {
      padding:12px;
      border:none;
      background:#020617;
      color:white;
    }

  </style>
</head>

<body>

<div class="layout">

  <div class="sidebar">
    <img src="/orn-product/branding/logo.jpg">
    <h3>ORN Product</h3>
    <small>ARA Agents™</small>

    <div class="menu">
      <div onclick="handleCommand('Launch Thailand')">Launch Thailand</div>
      <div onclick="handleCommand('Show Margin')">Margin Analysis</div>
      <div onclick="handleCommand('Show Opportunities')">Opportunities</div>
      <div onclick="handleCommand('Create Report')">Market Report</div>
    </div>
  </div>

  <div class="main">

    <h1>AI Contracting Intelligence</h1>

    <div class="cards">
      <div class="card">Revenue<span id="rev">-</span></div>
      <div class="card">Profit<span id="profit">-</span></div>
      <div class="card">Margin<span id="margin">-</span></div>
    </div>

    <canvas id="chart"></canvas>

    <div class="report" id="report"></div>

  </div>

</div>

<div class="chat">
  <div class="chat-header">🤖 ARA Agents</div>
  <div class="chat-box" id="chatBox">
    <div class="msg ai">ARA Coordinator: Try "Launch Thailand" or "Create Report".</div>
  </div>
  <input id="chatInput" onkeydown="chatEnter(event)" placeholder="Ask...">
</div>

<script>

function addMsg(text,type="ai"){
  const box=document.getElementById("chatBox");
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  box.appendChild(div);
}

function chatEnter(e){
  if(e.key==="Enter"){
    const val=document.getElementById("chatInput").value;
    addMsg(val,"user");
    handleCommand(val);
    document.getElementById("chatInput").value="";
  }
}

function handleCommand(cmd){

  addMsg("ARA Coordinator: Reviewing with team...","ai");

  if(cmd.toLowerCase().includes("launch")){
    runAnalysis();
  }

  if(cmd.toLowerCase().includes("report")){
    createReport();
  }

  if(cmd.toLowerCase().includes("margin")){
    addMsg("ARA Commercial Agent: Margin weak in Phuket.","ai");
  }

  if(cmd.toLowerCase().includes("opportunity")){
    addMsg("ARA Revenue Agent: Bangkok pricing +18%.","ai");
  }
}

async function runAnalysis(){

  addMsg("ARA Agents analysing data...","ai");

  const res = await fetch("/orn-product/data/thailand-bookings.csv");
  const text = await res.text();
  const rows = text.split("\n").slice(1);

  let revenue=0, cost=0;

  rows.forEach(r=>{
    const c=r.split(",");
    if(c.length<8) return;

    revenue += c[7]*c[4]*c[5];
    cost += c[6]*c[4]*c[5];
  });

  const profit=revenue-cost;
  const margin=((profit/revenue)*100).toFixed(1);

  document.getElementById("rev").innerText="£"+Math.round(revenue);
  document.getElementById("profit").innerText="£"+Math.round(profit);
  document.getElementById("margin").innerText=margin+"%";

  drawChart(rows);
}

function createReport(){

  document.getElementById("report").innerHTML = `
  <h3>Thailand Market Report</h3>
  Demand remains strong across Bangkok and Phuket, with clear pricing elasticity in premium segments.
  Margin performance is below target in Phuket due to supplier rates exceeding market benchmarks.
  Key opportunities include renegotiating supplier contracts and increasing pricing in Bangkok by 15–20%.
  Immediate actions should focus on cost optimisation and yield management strategies.
  `;

  addMsg("ARA Coordinator: Market report generated.","ai");
}

function drawChart(rows){

  let labels=[], data=[];

  rows.forEach(r=>{
    const c=r.split(",");
    if(c.length<8) return;
    labels.push(c[1]);
    data.push(c[7]-c[6]);
  });

  new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{ labels:labels, datasets:[{label:"Margin",data:data}] }
  });
}

</script>

</body>
</html>
