<!DOCTYPE html>
<html>
<head>
  <title>ORN Product – ARA Agents Platform</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', Arial;
      background:#0f172a;
      color:white;
    }

    .layout { display:flex; }

    .sidebar {
      width:220px;
      background:#020617;
      height:100vh;
      padding:20px;
      border-right:1px solid #1e293b;
    }

    .sidebar img { width:50px; }

    .sidebar h3 { margin:10px 0 0; }

    .menu div {
      padding:12px;
      margin-top:10px;
      border-radius:6px;
      cursor:pointer;
      color:#94a3b8;
    }

    .menu div:hover {
      background:#1e293b;
      color:white;
    }

    .main {
      flex:1;
      padding:25px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    input {
      padding:10px;
      width:260px;
      border-radius:6px;
      border:none;
      outline:none;
    }

    button {
      padding:10px 15px;
      background:#3b82f6;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
      box-shadow:0 0 10px rgba(59,130,246,0.5);
    }

    .cards {
      display:flex;
      gap:15px;
      margin-top:20px;
    }

    .card {
      flex:1;
      background:#020617;
      padding:20px;
      border-radius:10px;
      border:1px solid #1e293b;
      text-align:center;
    }

    .card b {
      color:#94a3b8;
      font-size:14px;
    }

    .card span {
      font-size:22px;
      display:block;
      margin-top:5px;
    }

    canvas {
      margin-top:30px;
    }

    /* CHAT PANEL */
    .chat-panel {
      position:fixed;
      right:20px;
      bottom:20px;
      width:320px;
      height:75%;
      background:#020617;
      border:1px solid #1e293b;
      border-radius:12px;
      display:flex;
      flex-direction:column;
      padding:15px;
    }

    .chat-header {
      font-weight:bold;
      margin-bottom:10px;
    }

    .chat-box {
      flex:1;
      overflow:auto;
    }

    .chat-msg {
      margin:8px 0;
      padding:10px;
      border-radius:8px;
      font-size:14px;
    }

    .ai {
      background:#1e293b;
    }

    .user {
      background:#3b82f6;
      text-align:right;
    }

    #chatInput {
      margin-top:10px;
      padding:10px;
      border:none;
      border-radius:6px;
      outline:none;
    }

  </style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <img src="../branding/logo.jpg">
    <h3>ORN Product</h3>
    <small>ARA Agents™</small>

    <div class="menu">
      <div onclick="runAnalysis()">Dashboard</div>
      <div>Markets</div>
      <div>Bookings</div>
      <div>Suppliers</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h1>AI Revenue Intelligence</h1>
      <div>
        <input id="command" placeholder="Launch Thailand">
        <button onclick="runAnalysis()">Run</button>
      </div>
    </div>

    <!-- KPI CARDS -->
    <div class="cards">
      <div class="card"><b>Total Revenue</b><span id="rev">-</span></div>
      <div class="card"><b>Total Profit</b><span id="profit">-</span></div>
      <div class="card"><b>Margin %</b><span id="margin">-</span></div>
    </div>

    <canvas id="chart"></canvas>

  </div>

</div>

<!-- CHAT PANEL -->
<div class="chat-panel">

  <div class="chat-header">🤖 ARA Agents</div>

  <div class="chat-box" id="chatBox">
    <div class="chat-msg ai">
      ARA Agent: Ready. Ask me about pricing, margin, bookings or suppliers.
    </div>
  </div>

  <input id="chatInput" placeholder="Ask ARA Agents..." onkeydown="chatEnter(event)">

</div>

<script>

function addChat(msg,type="ai"){
  const box = document.getElementById("chatBox");
  const div = document.createElement("div");
  div.className = "chat-msg "+type;
  div.innerText = msg;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function chatEnter(e){
  if(e.key==="Enter"){
    const val = document.getElementById("chatInput").value;
    addChat(val,"user");

    handleCommand(val);

    document.getElementById("chatInput").value="";
  }
}

function runAnalysis(){
  const cmd = document.getElementById("command").value;
  handleCommand(cmd);
}

function handleCommand(cmd){

  addChat("ARA System: Analysing...");

  if(cmd.toLowerCase().includes("thailand")){
    runThailand();
  }
  else if(cmd.toLowerCase().includes("margin")){
    addChat("ARA Commercial Agent: Margin issues in Phuket. Recommend renegotiation.");
  }
  else if(cmd.toLowerCase().includes("opportunity")){
    addChat("ARA Revenue Agent: Bangkok pricing uplift opportunity +18%.");
  }
  else{
    addChat("ARA Agent: Can you clarify if this relates to pricing, margin or suppliers?");
  }
}

async function runThailand(){

  const res = await fetch("../data/thailand-bookings.csv");
  const text = await res.text();
  const rows = text.split("\n").slice(1);

  let revenue=0, cost=0;

  rows.forEach(r=>{
    const [id,h,c,d,n,rooms,costP,sellP] = r.split(",");
    revenue += sellP*n*rooms;
    cost += costP*n*rooms;
  });

  const profit = revenue - cost;
  const margin = ((profit/revenue)*100).toFixed(1);

  document.getElementById("rev").innerText = "£"+Math.round(revenue);
  document.getElementById("profit").innerText = "£"+Math.round(profit);
  document.getElementById("margin").innerText = margin+"%";

  drawChart(rows);

  addChat("ARA Analyst: Thailand shows strong revenue but margin gaps in Phuket.");
}

function drawChart(rows){

  let labels=[], data=[];

  rows.forEach(r=>{
    const [id,h,c,d,n,rooms,costP,sellP] = r.split(",");
    labels.push(h);
    data.push((sellP-costP));
  });

  const ctx = document.getElementById("chart");

  if(window.chart) window.chart.destroy();

  window.chart = new Chart(ctx,{
    type:'bar',
    data:{
      labels:labels,
      datasets:[{
        label:"Margin per Booking (£)",
        data:data
      }]
    }
  });
}

</script>

</body>
</html>
