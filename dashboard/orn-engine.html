<!DOCTYPE html>
<html>
<head>
  <title>ORN AI Engine</title>
  <style>
    body { font-family: Arial; padding:20px; background:#f5f5f5; }
    input, button { padding:10px; font-size:16px; }
    .output { margin-top:20px; background:white; padding:20px; border-radius:10px; }
    .green { color:green; }
    .red { color:red; }
    .yellow { color:#c9a000; }
  </style>
</head>

<body>

<h1>ORN Product – AI Command Engine</h1>

<input id="command" placeholder="Type command e.g. Launch Thailand">
<button onclick="runCommand()">Run</button>

<div class="output" id="output"></div>

<script>

function runCommand() {
  const cmd = document.getElementById("command").value;

  if (cmd.toLowerCase().includes("thailand")) {

    document.getElementById("output").innerHTML = `
      <h2>🌏 Thailand Market Launched</h2>

      <h3>📊 Market Analysis</h3>
      <p>High demand in Bangkok & Phuket. Strong seasonal pricing opportunities.</p>

      <h3>💰 Revenue Insights</h3>
      <p class="green">Savings Identified: £18,200</p>
      <p class="red">Low Margin Bookings: 9</p>

      <h3>💡 Opportunities</h3>
      <ul>
        <li class="green">Rebook Phuket hotels → Save £2,300</li>
        <li class="yellow">Increase Bangkok pricing → +18%</li>
        <li class="red">Low margin Chiang Mai bookings</li>
      </ul>

      <h3>📋 Action Plan</h3>
      <ul>
        <li>Renegotiate supplier contracts</li>
        <li>Increase pricing in high demand areas</li>
        <li>Push sales for low occupancy dates</li>
      </ul>

      <h3>✅ Task List</h3>
      <ul>
        <li>Contact Phuket hotels</li>
        <li>Adjust Bangkok pricing</li>
        <li>Review Chiang Mai contracts</li>
      </ul>

      <h3>📧 Outreach Email</h3>
      <p>
      Subject: Partnership Opportunity – Thailand<br><br>
      Dear Partner,<br><br>
      We are expanding into Thailand and would like to discuss improved rates and long-term collaboration.<br><br>
      ORN Product Team
      </p>
    `;
  }
}

</script>

</body>
</html>
