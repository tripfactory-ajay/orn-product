<!DOCTYPE html>
<html>
<head>
  <title>ORN Product – AI Contracting Engine</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #f5f7fa, #e4ecf7);
      padding: 30px;
    }

    h1 {
      color: #2c3e50;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    input {
      padding: 12px;
      width: 350px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #1a252f;
    }

    .output {
      margin-top: 25px;
      background: white;
      padding: 25px;
      border-radius: 10px;
      border-left: 6px solid #2c3e50;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }

    .card-container {
      display: flex;
      gap: 20px;
      margin-top: 15px;
    }

    .card {
      background: #ffffff;
      padding: 20px;
      border-radius: 10px;
      flex: 1;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .green { color: green; }
    .red { color: red; }
    .yellow { color: #c9a000; }

    #chat {
      margin-top: 15px;
      font-style: italic;
      color: #555;
    }
  </style>
</head>

<body>

<div class="header">
  <img src="../branding/logo.jpg" width="60">
  <h1>ORN Product – AI Contracting Engine</h1>
</div>

<br>

<input id="command" placeholder="Ask ORN e.g. Launch Thailand or Where are we losing money?">
<button onclick="runCommand()">Run</button>

<div id="chat"></div>

<div class="output" id="output">
  <p>Ask a question or launch a market...</p>
</div>

<script>

function think(message) {
  document.getElementById("chat").innerHTML = message;
}

function runCommand() {
  const cmd = document.getElementById("command").value.toLowerCase();

  think("Interesting… analysing that now...");

  setTimeout(() => {

    if (cmd.includes("thailand")) {
      runThailand();
    }
    else if (cmd.includes("margin") || cmd.includes("losing")) {
      showMargin();
    }
    else if (cmd.includes("opportunities") || cmd.includes("growth")) {
      showOpportunities();
    }
    else if (cmd.includes("suppliers") || cmd.includes("contracts")) {
      showSuppliers();
    }
    else {
      think("Good question — are you looking at pricing, bookings, or supplier performance?");
    }

  }, 1500);
}

function runThailand() {
  think("Thailand launched. Reviewing demand, pricing, and supplier performance...");

  document.getElementById("output").innerHTML = `
    <h2>🌏 Thailand Market Analysis</h2>

    <div class="card-container">
      <div class="card"><b>Revenue</b><br>£120,000</div>
      <div class="card green"><b>Savings</b><br>£18,200</div>
      <div class="card red"><b>Low Margin</b><br>9 Bookings</div>
    </div>

    <h3>📊 Market Overview</h3>
    <p>Strong demand in Bangkok & Phuket. Pricing upside identified in premium segments.</p>

    <h3>💡 Opportunities</h3>
    <ul>
      <li class="green">Rebook Phuket hotels → £2,300 saving</li>
      <li class="yellow">Increase Bangkok pricing → +18%</li>
      <li>Push Chiang Mai for occupancy</li>
    </ul>

    <h3>📋 Action Plan</h3>
    <ul>
      <li>Renegotiate Phuket supplier contracts</li>
      <li>Increase pricing in Bangkok</li>
      <li>Reallocate inventory to high demand areas</li>
    </ul>

    <h3>📧 Outreach</h3>
    <p><b>Subject:</b> Thailand Partnership Opportunity<br><br>
    Dear Partner,<br><br>
    We are reviewing supplier agreements in Thailand and would like to discuss improved rates and long-term collaboration.<br><br>
    ORN Product Team</p>
  `;
}

function showMargin() {
  think("Great question — reviewing margin performance across all bookings...");

  document.getElementById("output").innerHTML = `
    <h2>📉 Margin Performance</h2>

    <div class="card-container">
      <div class="card red"><b>Low Margin</b><br>9 Bookings</div>
      <div class="card"><b>Avg Margin</b><br>18%</div>
      <div class="card yellow"><b>Target</b><br>25%</div>
    </div>

    <ul>
      <li>Phuket Beach Resort → Low margin</li>
      <li>Pattaya Budget → Underperforming</li>
      <li>Chiang Mai Lodge → Pricing too low</li>
    </ul>
  `;
}

function showOpportunities() {
  think("Let me highlight the biggest growth opportunities...");

  document.getElementById("output").innerHTML = `
    <h2>📈 Growth Opportunities</h2>

    <ul>
      <li>Increase Bangkok pricing by 18%</li>
      <li>Rebook suppliers in Phuket → £2,300 saving</li>
      <li>Expand premium product offering</li>
    </ul>
  `;
}

function showSuppliers() {
  think("Reviewing supplier performance and contract opportunities...");

  document.getElementById("output").innerHTML = `
    <h2>🏨 Supplier Analysis</h2>

    <ul>
      <li>Phuket suppliers overpriced vs market</li>
      <li>Bangkok suppliers competitive</li>
      <li>Krabi contracts need renegotiation</li>
    </ul>
  `;
}

</script>

</body>
</html>
